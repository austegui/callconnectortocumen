<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Widget</title>
    <link rel="stylesheet" href="/widget-frame.css" />
  </head>
  <body>
    <main class="widget">
      <div class="widget__card">
        <p class="widget__eyebrow">AI Voice Assistant</p>
        <h1 class="widget__title" id="title">Talk to us</h1>
        <p class="widget__body" id="body">
          Start a browser conversation with our assistant. We will ask for microphone access.
        </p>

        <div class="widget__status" id="status">Ready</div>

        <div class="widget__actions">
          <button class="widget__button" id="callButton" type="button">Call now</button>
          <button class="widget__secondary" id="hangupButton" type="button" disabled>
            Hang up
          </button>
        </div>

        <a class="widget__fallback hidden" id="fallbackLink" href="#">Call by phone instead</a>

        <p class="widget__fineprint">
          Powered by Retell Web Call. On mobile, use the phone fallback when available.
        </p>
      </div>
    </main>

    <script src="/vendor/eventemitter3.min.js"></script>
    <script src="/vendor/livekit-client.umd.js"></script>
    <script src="/vendor/retell-client.umd.js"></script>
    <script src="/widget-frame.js"></script>
  </body>
</html>
