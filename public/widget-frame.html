<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Asistente de Voz</title>
    <link rel="stylesheet" href="/widget-frame.css" />
  </head>
  <body>
    <main class="widget">
      <div class="widget__card">
        <p class="widget__eyebrow">Asistente de Voz</p>
        <h1 class="widget__title" id="title">Habla con Nosotros</h1>
        <p class="widget__body" id="body">
          Inicia una llamada desde el navegador. Te solicitaremos acceso al microfono y, si hace
          falta, la llamada puede transferirse.
        </p>

      <div class="widget__status" id="status">Listo</div>

        <div class="widget__actions">
          <button class="widget__button" id="callButton" type="button">Iniciar Llamada</button>
          <button class="widget__secondary" id="hangupButton" type="button" disabled>
            Finalizar
          </button>
        </div>

        <a class="widget__fallback hidden" id="fallbackLink" href="#">Llamar por telefono</a>

        <p class="widget__fineprint" id="fineprint">
          Operado por Inferencia Digital.
        </p>
      </div>
    </main>

    <script src="/vendor/twilio.min.js"></script>
    <script src="/widget-frame.js"></script>
  </body>
</html>
